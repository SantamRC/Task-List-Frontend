<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="contact_person">
    <th mat-header-cell *matHeaderCellDef> contact_person </th>
    <td mat-cell *matCellDef="let element"> {{element.contact_person}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> description </th>
    <td mat-cell *matCellDef="let element"> {{element.description}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="due_date">
    <th mat-header-cell *matHeaderCellDef> Weight </th>
    <td mat-cell *matCellDef="let element"> {{element.due_date}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="entity_name">
    <th mat-header-cell *matHeaderCellDef> entity_name </th>
    <td mat-cell *matCellDef="let element"> {{element.entity_name}} </td>
  </ng-container>

  <!-- Status Column -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> status </th>
    <td mat-cell *matCellDef="let element"> {{element.status}} </td>
  </ng-container>


  <!-- id Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> id </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>

  <!-- task_type Column -->
  <ng-container matColumnDef="task_type">
    <th mat-header-cell *matHeaderCellDef> task_type </th>
    <td mat-cell *matCellDef="let element"> {{element.task_type}} </td>
  </ng-container>

  <!-- title Column -->
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef> title </th>
    <td mat-cell *matCellDef="let element"> {{element.title}} </td>
  </ng-container>

  <!-- user_id Column -->
  <ng-container matColumnDef="user_id">
    <th mat-header-cell *matHeaderCellDef> user_id </th>
    <td mat-cell *matCellDef="let element"> {{element.user_id}} </td>
  </ng-container>
  

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
